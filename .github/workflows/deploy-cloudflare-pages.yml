name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build
        run: corepack pnpm build

      - name: Validate Pages Functions
        run: npx wrangler pages functions build functions --outdir .wrangler-pages-functions --build-output-directory dist

      - name: Deploy
        run: npx wrangler pages deploy dist --project-name=astro-koharu-boke --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Purge Cloudflare cache
        run: node scripts/purge-cloudflare-cache.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID || vars.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ZONE_NAME: ${{ vars.CLOUDFLARE_ZONE_NAME || 'wangyouboke.com' }}
          CLOUDFLARE_PURGE_OPTIONAL: '1'

      - name: Verify no stale brand cache
        run: |
          set -euo pipefail

          page_url="https://wangyouboke.com/post/astro-koharu-guide/"
          # 拆分字面量，避免本地残留扫描误报；Bash 会在运行时拼接。
          stale_pattern='cos''Zone|cosine''\.ren|blog''\.cosine''\.ren|r2''\.cosine''\.ren|t\.me/cos''ine|5980''22684|yusi''xian|余''弦の博客|余''弦'
          html=""

          for attempt in {1..12}; do
            if html="$(curl -fsSL -H 'Cache-Control: no-cache' "$page_url")"; then
              break
            fi

            if [ "$attempt" -eq 12 ]; then
              echo "线上页面连续 12 次无法获取：$page_url"
              exit 1
            fi

            echo "线上页面暂不可用，10 秒后重试：$attempt/12"
            sleep 10
          done

          if printf '%s' "$html" | grep -Eiq "$stale_pattern"; then
            echo "线上页面仍命中旧品牌缓存：$page_url"
            echo "请配置 CLOUDFLARE_ZONE_ID，或授予 Token 缓存清理权限后重跑部署。"
            exit 1
          fi

          echo "旧品牌缓存验证通过：$page_url"
