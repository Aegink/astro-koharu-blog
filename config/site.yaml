site:
  title: 忘忧の博客
  alternate: Aegink
  subtitle: WA 的一声就哭了
  name: Aegink
  description: 忘忧的个人博客，记录技术、工具、阅读与生活。
  avatar: /img/avatar.webp
  showLogo: true
  author: 忘忧
  url: https://wangyouboke.com
  defaultOgImage: /img/avatar.webp
  startYear: 2026
  timezone: Asia/Shanghai
  keywords:
    - 博客
    - Astro
    - 技术
    - 前端
    - Aegink
    - 忘忧
  enableSlugTransliteration: false
i18n:
  defaultLocale: zh
  locales:
    - code: zh
      label: 中文
      enabled: true
    - code: en
      label: English
      enabled: true
    - code: ja
      label: 日本語
      enabled: true
categoryMap:
  随笔: life
  笔记: note
  工具: tools
  周刊: weekly
  前端: front-end
  阅读: yue-du
  旧博客: legacy
  技术分享: technology-sharing
  知识科普: knowledge-popularization
  未分类: uncategorized
featuredCategories:
  - label: 随笔
    link: life
    image: /img/cover/2.webp
    description: 生活记录、随想随笔
  - label: 笔记
    link: note
    image: /img/cover/4.webp
    description: 技术笔记、学习笔记
  - label: 前端
    link: note/front-end
    image: /img/cover/1.webp
    description: 前端技术相关
  - label: 工具
    link: tools
    image: /img/cover/11.webp
    description: 工具使用、效率提升
featuredSeries:
  - slug: weekly
    categoryName: 周刊
    label: 我的周刊
    fullName: 我的技术周刊
    cover: /img/weekly_header.webp
    icon: ri:newspaper-line
    enabled: true
    links:
      github: https://github.com/Aegink/astro-koharu-blog
      rss: /rss.xml
    description: 记录技术、工具、阅读与生活里的阶段性内容。
social:
  github:
    url: https://github.com/Aegink
    icon: ri:github-fill
    color: '#191717'
  rss:
    url: /rss.xml
    icon: ri:rss-line
    color: '#ff6600'
friends:
  intro:
    title: 友情链接
    subtitle: 欢迎交换友链！
    applyTitle: 申请友链
    applyDesc: 可通过 GitHub 联系我交换友链，格式如下
    exampleYaml: |
      - site: 你的博客名称 # 站点名称
        url: https://your-blog.com/ # 站点网址
        owner: 你的昵称 # 昵称
        desc: 站点简介 # 站点简介
        image: https://your-blog.com/avatar.jpg # 头像链接
        color: "#ffc0cb" # 主题色（可选）
  data: []
announcements: []
content:
  addBlankTarget: true
  smoothScroll: true
  addHeadingLevel: true
  enhanceCodeBlock: true
  enableCodeCopy: true
  enableCodeFullscreen: true
  enableLinkEmbed: true
  enableCodePenEmbed: true
  enableTweetEmbed: true
  enableOGPreview: true
  previewCacheTime: 30
  lazyLoadEmbeds: true
  postCardImagePosition: alternating
  enableShokaContainers: true
  enableShokaAttrs: true
  enableShokaEffects: true
  enableShokaSpoiler: true
  enableShokaRuby: true
  enableShokaHexoTags: true
  enableMath: true
  enableCodeMeta: true
  enableQuiz: true
  enableEncryptedBlock: true
navigation:
  - name: 首页
    nameKey: nav.home
    path: /
    icon: ri:home-heart-fill
  - name: 周刊
    nameKey: nav.weekly
    path: /weekly
    icon: ri:newspaper-line
  - name: 文章
    nameKey: nav.posts
    icon: ri:quill-pen-ai-fill
    children:
      - name: 分类
        nameKey: nav.categories
        path: /categories
        icon: ri:grid-fill
      - name: 标签
        nameKey: nav.tags
        path: /tags
        icon: fa6-solid:tags
      - name: 归档
        nameKey: nav.archives
        path: /archives
        icon: ri:archive-2-fill
  - name: 友链
    nameKey: nav.friends
    path: /friends
    icon: ri:links-line
  - name: 关于
    nameKey: nav.about
    path: /about
    icon: fa6-regular:circle-user
  - name: 歌单
    nameKey: nav.music
    path: /music
    icon: ri:music-2-fill
comment:
  provider: none
  twikoo:
    envId: ''
  giscus:
    repo: ''
    repoId: ''
  waline:
    serverURL: ''
    wordLimit: 0
    imageUploader: false
    highlighter: true
    texRenderer: false
    search: false
    noCopyright: false
  remark42:
    host: ''
    siteId: ''
analytics:
  umami:
    enabled: false
    id: ''
    endpoint: ''
seo:
  robots: null
bgm:
  enabled: true
  audio:
    - title: 最爱山山
      list:
        - https://music.163.com/playlist?id=8676645748
    - title: Love Vocaloid
      list:
        - https://music.163.com/playlist?id=8882890045
christmas:
  enabled: false
  features:
    snowfall: false
    christmasColorScheme: true
    christmasHat: true
    christmasCoverDecoration: true
    readingTimeSnow: true
  snowfall:
    speed: 0.5
    intensity: 0.7
    mobileIntensity: 0.4
    maxLayers: 6
    maxIterations: 8
    mobileMaxLayers: 4
    mobileMaxIterations: 6
dev:
  localProjectPath: F:/Boke/astro-koharu
  contentRelativePath: src/content/blog
  editors:
    - id: vscode
      name: VS Code
      icon: devicon-plain:vscode
      urlTemplate: vscode://file/{path}
    - id: cursor
      name: Cursor
      icon: simple-icons:cursor
      urlTemplate: cursor://file/{path}
    - id: zed
      name: Zed
      icon: simple-icons:zedindustries
      urlTemplate: zed://file/{path}
defaultCoverList: []
